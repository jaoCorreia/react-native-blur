name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  cpp-tests:
    name: C++ Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build-type: [Debug, Release]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build

      - name: Configure CMake
        run: |
          cmake -B build -S blur-core \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DBLUR_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build

      - name: Run tests
        run: cd build && ctest --output-on-failure -V

  cpp-benchmarks:
    name: C++ Benchmarks (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          # Free GitHub-hosted arm64 runner: compiles and runs the NEON path
          # natively (no QEMU), so these numbers are representative of real
          # ARM devices in a way the x86_64 AVX2 numbers are not.
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build

      - name: Configure CMake
        run: |
          cmake -B build -S blur-core \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DBENCHMARK_ENABLE_TESTING=OFF \
            -DBLUR_BUILD_BENCHMARKS=ON

      - name: Build
        run: cmake --build build

      # Aggregate over repetitions so the artifact carries mean/median/stddev,
      # not a single noisy sample. min_time keeps each repetition long enough
      # that shared-runner scheduling jitter averages out.
      - name: Run benchmarks
        run: |
          ./build/blur-bench \
            --benchmark_min_time=0.2s \
            --benchmark_repetitions=10 \
            --benchmark_report_aggregates_only=true \
            --benchmark_out=benchmark-${{ matrix.arch }}.json \
            --benchmark_out_format=json

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ matrix.arch }}
          path: benchmark-${{ matrix.arch }}.json

  benchmark-regression:
    name: Benchmark Regression (PR vs base)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # python3-scipy/numpy back Google Benchmark's tools/compare.py, which
      # runs a Mann-Whitney U-test on the two repetition sets and reports a
      # p-value per benchmark — a real significance test, not eyeballing means.
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build python3-scipy python3-numpy

      - name: Build + run PR benchmark
        run: |
          cmake -B build-pr -S blur-core -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DBENCHMARK_ENABLE_TESTING=OFF \
            -DBLUR_BUILD_BENCHMARKS=ON
          cmake --build build-pr
          # No aggregates-only here: compare.py needs the per-repetition
          # samples to run the U-test. 10 reps clears its "9+ recommended" bar.
          ./build-pr/blur-bench \
            --benchmark_min_time=0.2s \
            --benchmark_repetitions=10 \
            --benchmark_out=pr.json --benchmark_out_format=json

      # compare.py lives in the benchmark source FetchContent just downloaded;
      # copy it out so it survives the checkout of the base commit below.
      - name: Stash comparison tooling
        run: cp -r build-pr/_deps/googlebenchmark-src/tools benchmark-tools

      - name: Build + run base benchmark
        run: |
          git checkout ${{ github.event.pull_request.base.sha }}
          cmake -B build-base -S blur-core -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DBENCHMARK_ENABLE_TESTING=OFF \
            -DBLUR_BUILD_BENCHMARKS=ON
          cmake --build build-base
          ./build-base/blur-bench \
            --benchmark_min_time=0.2s \
            --benchmark_repetitions=10 \
            --benchmark_out=base.json --benchmark_out_format=json || true

      # Informational, not a hard gate: perf on shared runners is too noisy to
      # fail a build on, and when a PR renames benchmarks (like the one that
      # introduced this job) there's nothing to line up. Results land in the
      # PR's job summary. Benchmarks present in both files are compared with a
      # U-test; new/removed ones are listed separately.
      - name: Compare base vs PR
        run: |
          {
            echo '## Benchmark: base vs PR'
            echo '```'
            python3 benchmark-tools/compare.py benchmarks base.json pr.json || echo '(no comparable benchmarks — likely a harness change)'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  address-sanitizer:
    name: Address Sanitizer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build

      - name: Configure with ASan
        run: |
          cmake -B build -S blur-core \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCMAKE_CXX_FLAGS="-fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address" \
            -DBLUR_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build

      - name: Run with ASan
        run: cd build && ctest --output-on-failure -V
        env:
          ASAN_OPTIONS: detect_leaks=1:detect_stack_use_after_return=1

  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        run: npm install

      - name: Type check
        run: npx tsc --noEmit

  cmake-install:
    name: CMake install() / find_package()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build

      - name: Configure blur-core
        run: |
          cmake -B build -S blur-core \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5

      - name: Build
        run: cmake --build build

      - name: Install to a throwaway prefix
        run: cmake --install build --prefix "${{ github.workspace }}/install-prefix"

      # Proves find_package(blur-core) actually resolves and links, not just
      # that the config files look plausible.
      - name: Configure consumer against the installed package
        run: |
          cmake -B build-consumer -S blur-core/tests/consumer_smoke \
            -G Ninja \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/install-prefix"

      - name: Build consumer
        run: cmake --build build-consumer

      - name: Run consumer
        run: ./build-consumer/consumer-smoke

  aarch64-neon:
    name: aarch64 Cross-Compile + Tests (QEMU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross toolchain and QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++-aarch64-linux-gnu qemu-user-static

      # x86_64 runners never compile blur-core/src/neon/gaussian_neon.cpp
      # (it's gated on CMAKE_SYSTEM_PROCESSOR), so without this job the most
      # perf-critical file in the repo never sees a compiler in CI.
      - name: Configure CMake (aarch64 cross-compile)
        run: |
          cmake -B build-aarch64 -S blur-core \
            -G Ninja \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DCMAKE_EXE_LINKER_FLAGS=-static \
            -DCMAKE_CROSSCOMPILING_EMULATOR=qemu-aarch64-static \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DBLUR_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build-aarch64

      - name: Verify NEON was actually compiled in
        run: |
          find build-aarch64 -name "*gaussian_neon*" | grep -q gaussian_neon

      - name: Run tests under QEMU
        run: cd build-aarch64 && ctest --output-on-failure -V

  android-build:
    name: Android Library Build (Gradle + NDK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # The runner's ambient `gradle` defaults to whatever's newest in the
      # image (9.x), which is too new for AGP 8.2.0 (removed APIs like
      # SelfResolvingDependency) — there's no committed Gradle wrapper here,
      # so pin an AGP-8.2-compatible version explicitly instead.
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      # Compiles the Kotlin view manager and cross-compiles blur-core for
      # every ABI (including arm64-v8a/armeabi-v7a, i.e. the real NEON path)
      # through the actual NDK toolchain — nothing in the C++-only CI jobs
      # touches the Android/Kotlin side at all. assembleDebugAndroidTest also
      # compiles the instrumentation sources (incl. the on-device benchmark)
      # so they can't rot — CI has no emulator, so this compiles but won't run.
      - name: Assemble debug AAR + androidTest APK
        run: gradle -p android assembleDebug assembleDebugAndroidTest --no-daemon
